# golangci-lint configuration (v2 schema).
# Run locally with `make lint`; CI runs the same linters via golangci-lint-action.
version: "2"

run:
  timeout: 5m

linters:
  # The default set (errcheck, govet, ineffassign, staticcheck, unused) stays
  # enabled; these add high-signal, low-noise checks on top.
  enable:
    - bodyclose    # HTTP response bodies are always closed
    - errorlint    # correct error wrapping/comparison (errors.Is/As, %w)
    - misspell     # common spelling mistakes in comments and strings
    - unconvert    # remove redundant type conversions

formatters:
  enable:
    - gofmt
    - goimports
